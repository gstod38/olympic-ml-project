# Data settings
data:
  raw_path: "data/athlete_events.csv"
  cleaned_path: "data/athlete_events_cleaned.csv"
  test_size: 0.2
  random_state: 42

# Model hyperparameters - These are the values you'll tweak for your 5 runs
model:
  n_estimators: 500
  max_depth: 50
  class_weight: "balanced"
  random_state: 42
  n_jobs: -1

# MLflow settings
mlflow:
  experiment_name: "Olympic_Medal_Prediction"